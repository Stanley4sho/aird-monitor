name: Update AI-RDM data and deploy

on:
  schedule:
    # Taipei 06:10 = UTC 22:10 on the previous day.
    - cron: "10 22 * * *"
    # Taipei 07:30 = UTC 23:30 on the previous day.
    - cron: "30 23 * * *"
    # Extra market-price proxy refresh during regular US market hours.
    - cron: "30 14-21 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - market

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-and-data
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      UPDATE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || (github.event.schedule == '30 14-21 * * 1-5' && 'market' || 'full') }}
      SEC_USER_AGENT: "ai-rdm-monitor contact example@example.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Update JSON data
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          if ! git diff --quiet -- public/data; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data
            git commit -m "data: update AI-RDM $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase
            git push
          else
            echo "No data changes to commit."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
